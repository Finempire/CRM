version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: garmentos_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: garmentos
      POSTGRES_PASSWORD: Abhi@1998
      POSTGRES_DB: garmentos_db
    ports:
      - "5433:5432"
    volumes:
      - garmentos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garmentos -d garmentos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: garmentos_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@garmentos.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  garmentos_pgdata:
    driver: local
