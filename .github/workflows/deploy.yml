name: Deploy to Linode

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: false   # never cancel an in-flight deploy

jobs:
  build-and-deploy:
    name: Build, Lint, Typecheck & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Node.js setup with npm cache ──────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── 3. Install ───────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 4. Quality gates ─────────────────────────────────────────────────────
      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      # ── 5. Build ─────────────────────────────────────────────────────────────
      - name: Build Next.js
        run: npm run build
        env:
          # Public env vars that must be available at build time
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_APP_NAME: "ThreadFlow OS"
          # Suppress Prisma CLI from trying to connect during build
          PRISMA_GENERATE_SKIP_AUTOINSTALL: "true"

      # ── 6. Sync built artefacts to Linode via rsync over SSH ─────────────────
      - name: Deploy to Linode via rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.LINODE_HOST_IP }}
          REMOTE_USER: ${{ secrets.LINODE_SSH_USER }}
          TARGET: "/var/www/threadflow"
          EXCLUDE: >-
            /node_modules/,
            /.git/,
            /.env*,
            /.next/cache/,
            /public/uploads/

      # ── 7. Remote: install prod deps, migrate DB, restart app ────────────────
      - name: Run post-deploy steps on Linode
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.LINODE_HOST_IP }}
          username: ${{ secrets.LINODE_SSH_USER }}
          key: ${{ secrets.LINODE_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/threadflow

            # Install production-only dependencies
            npm ci --omit=dev

            # Generate Prisma client matching installed engine
            npx prisma generate

            # Apply any pending migrations (safe in CI — uses deploy mode)
            npx prisma migrate deploy

            # Reload app via PM2 (zero-downtime reload)
            pm2 reload threadflow-os --update-env

            # Persist PM2 process list across reboots
            pm2 save
