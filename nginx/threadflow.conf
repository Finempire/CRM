# Nginx configuration for ThreadFlow OS
# Place at: /etc/nginx/sites-available/threadflow
# Enable with: sudo ln -s /etc/nginx/sites-available/threadflow /etc/nginx/sites-enabled/
# Test with:   sudo nginx -t
# Reload with: sudo systemctl reload nginx
# SSL cert:    sudo certbot --nginx -d app.threadflow.com

# Rate limiting zone (10 MB shared memory, 30 req/s per IP)
limit_req_zone $binary_remote_addr zone=threadflow_ratelimit:10m rate=30r/s;

# Upstream — PM2 runs Next.js on port 3000 (2 cluster instances behind same port)
upstream threadflow_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# ── HTTP → HTTPS redirect ──────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name app.threadflow.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS main server block ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.threadflow.com;

    # SSL — managed by Certbot; do NOT edit these lines manually
    ssl_certificate     /etc/letsencrypt/live/app.threadflow.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.threadflow.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "SAMEORIGIN"                                    always;
    add_header X-Content-Type-Options     "nosniff"                                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"               always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()"      always;

    # Request body size limit — allows uploading files up to 52 MB
    client_max_body_size 52m;

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ── Next.js static assets (_next/static) — long cache ──────────────────────
    location /_next/static/ {
        proxy_pass http://threadflow_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Local uploaded files (dev/fallback only) ────────────────────────────────
    location /uploads/ {
        alias /var/www/threadflow/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Health check — no rate limit, no logging ────────────────────────────────
    location /api/health {
        proxy_pass         http://threadflow_app;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── API routes — stricter rate limit ───────────────────────────────────────
    location /api/ {
        limit_req zone=threadflow_ratelimit burst=60 nodelay;

        proxy_pass         http://threadflow_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── All other routes → Next.js ──────────────────────────────────────────────
    location / {
        limit_req zone=threadflow_ratelimit burst=20 nodelay;

        proxy_pass         http://threadflow_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
